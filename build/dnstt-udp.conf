# DNS-over-UDP Tunneling Server Configuration File
# 
# This configuration file controls the behavior of the dnstt-udp server.
# Edit this file to customize server behavior, then restart the service.

# ============================================================================
# NETWORK CONFIGURATION
# ============================================================================

# Server listening port (1-65535)
# Default: 5300 (common DNS tunnel port)
port = 53

# Bind address for listening socket
# Use 0.0.0.0 to listen on all interfaces
# Use 127.0.0.1 for localhost only
bind_address = 0.0.0.0

# ============================================================================
# WORKER THREAD CONFIGURATION
# ============================================================================

# Number of worker threads for concurrent processing (1-256)
# Recommended: 1 per CPU core for optimal performance
# Default: 4
worker_count = 64

# ============================================================================
# MTU AND BUFFER CONFIGURATION
# ============================================================================

# MTU (Maximum Transmission Unit) size in bytes (128-65535)
# Standard values:
#   128   - Minimum allowed (for testing)
#   512   - Very low MTU (custom configurations)
#   576   - Minimum for dialup / satellite
#   1280  - IPv6 default
#   1500  - Standard Ethernet
#   9000  - Jumbo frames (if supported)
# Default: 1500
mtu_size = 512

# Socket buffer size in bytes (for send and receive)
# Larger buffers help with burst traffic
# Default: 4194304 (4MB)
# Max recommended: 104857600 (100MB)
buffer_size = 4194304

# ============================================================================
# SESSION MANAGEMENT
# ============================================================================

# Session timeout in seconds
# Inactive sessions will be cleaned up after this duration
# Valid range: 10-3600 seconds
# Default: 300 (5 minutes)
session_timeout = 300

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

# Log level: DEBUG, INFO, WARN, ERR
# DEBUG - Verbose debug information
# INFO  - General informational messages
# WARN  - Warning messages only
# ERR   - Error messages only
# Default: INFO
log_level = INFO

# ============================================================================
# SECURITY AND KEYS
# ============================================================================

# Path to the public key file (64-byte binary)
# Generate with: dnstt-udp -g -k /path/to/pubkey
# Default: /etc/dnstt-udp/pubkey
pubkey_path = /etc/dnstt-udp/pubkey

# ============================================================================
# PERFORMANCE MONITORING
# ============================================================================

# Enable performance statistics monitoring
# Default: true
enable_stats = true

# Statistics update interval in milliseconds
# Default: 5000 (5 seconds)
stats_interval = 5000

# ============================================================================
# ADVANCED OPTIONS
# ============================================================================

# Enable UDP GW protocol compatibility (for badvpn-udpgw)
# Default: true
enable_udpgw_compat = true

# Maximum concurrent sessions
# Default: 10000
max_sessions = 10000

# ============================================================================
# END OF CONFIGURATION
# ============================================================================
